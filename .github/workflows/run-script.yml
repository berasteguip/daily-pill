name: Run Python script and persist history

on:
  schedule:
    - cron: "0 7 * * *"   # everyday at 7:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ensure history file exists
        run: |
          if [ ! -f history.txt ]; then
            touch history.txt
          fi

      - name: Run script
        run: python script.py

      - name: Commit and push history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add history.txt

          # If no changes, do not fail the job
          git diff --cached --quiet && exit 0

          git commit -m "Update history.txt"
          git push
